<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Fondo crema -->
  <rect width="100%" height="100%" fill="#FFF8EE"/>
  
  <!-- Ícono simple de plato/bandeja centrado -->
  <g transform="translate(200, 120)">
    <!-- Base del plato -->
    <path d="M-60 20 Q 0 40 60 20 L 70 30 Q 0 55 -70 30 Z" fill="#D96800"/>
    <!-- Tapa de la campana -->
    <path d="M-50 15 A 50 50 0 0 1 50 15 Z" fill="none" stroke="#4A210D" stroke-width="6"/>
    <!-- Manija -->
    <circle cx="0" cy="-35" r="8" fill="#4A210D"/>
  </g>

  <!-- Texto: Antojo Casero -->
  <text x="200" y="210" font-family="sans-serif" font-size="28" font-weight="bold" fill="#4A210D" text-anchor="middle">
    Antojo Casero
  </text>
  
  <!-- Texto secundario: Imagen próximamente -->
  <text x="200" y="240" font-family="sans-serif" font-size="16" fill="#6F5B4D" text-anchor="middle">
    Imagen próximamente
  </text>
</svg>
